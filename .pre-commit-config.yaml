repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.1  # <--- version anpassen, wenn du möchtest
    hooks:
      - id: ruff
        name: ruff (lint & fix)
        args: [--fix, --exit-non-zero-on-fix]
        additional_dependencies: []  # bleibt leer, Ruff kommt mit
      - id: ruff-format
        name: ruff (format)
        # keine args nötig, nutzt [tool.ruff.format] aus pyproject.toml

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-merge-conflict
      - id: debug-statements

  - repo: local
    hooks:
      - id: mypy
        name: mypy (strict type checking)
        entry: mypy --strict
        language: system
        pass_filenames: false
        files: ^src/
