name: Publish and Release

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    uses: ./.github/workflows/quality.yml

  artifact:
    name: Build and validate release artifacts
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      released: ${{ steps.prepare.outputs.released || 'false' }}
      version: ${{ steps.prepare.outputs.version }}
      tag: ${{ steps.prepare.outputs.tag }}

    steps:
      - name: Checkout exact release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - id: attach_release_branch
        name: Attach exact commit to the release branch
        run: |
          set -euo pipefail
          git switch -C "$GITHUB_REF_NAME" "$GITHUB_SHA"
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install release tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install python-semantic-release==10.6.1 build twine==6.0.1

      - id: prepare
        name: Prepare release artifacts without mutating Git
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          semantic-release version
          --no-commit
          --no-tag
          --no-push
          --no-vcs-release

      - name: Verify the stamped project version
        if: ${{ steps.prepare.outputs.released == 'true' }}
        env:
          EXPECTED_VERSION: ${{ steps.prepare.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          with Path("pyproject.toml").open("rb") as project_file:
              configuration = tomllib.load(project_file)
          actual_version = configuration["project"]["version"]
          expected_version = os.environ["EXPECTED_VERSION"]
          if actual_version != expected_version:
              raise SystemExit(
                  f"Stamped version {actual_version!r} does not match "
                  f"semantic-release version {expected_version!r}"
              )
          PY

      - name: Check distribution metadata
        if: ${{ steps.prepare.outputs.released == 'true' }}
        run: twine check dist/*

      - name: Validate distribution archives
        if: ${{ steps.prepare.outputs.released == 'true' }}
        env:
          EXPECTED_VERSION: ${{ steps.prepare.outputs.version }}
        run: >-
          python scripts/validate_distribution.py archives
          dist "$EXPECTED_VERSION"

      - name: Validate the installed wheel
        if: ${{ steps.prepare.outputs.released == 'true' }}
        run: |
          set -euo pipefail
          WHEEL="$(find dist -maxdepth 1 -type f -name '*.whl' -print -quit)"
          SDIST="$(find dist -maxdepth 1 -type f -name '*.tar.gz' -print -quit)"
          test -n "$WHEEL"
          test -n "$SDIST"
          python -m venv /tmp/general-manager-release-venv
          /tmp/general-manager-release-venv/bin/python -m pip install --upgrade pip
          /tmp/general-manager-release-venv/bin/python -m pip install "$WHEEL"
          cd /tmp
          /tmp/general-manager-release-venv/bin/python "$GITHUB_WORKSPACE/scripts/validate_distribution.py" installed
          /tmp/general-manager-release-venv/bin/python "$GITHUB_WORKSPACE/tests/packaging/smoke_chat_eval_distribution.py" "$GITHUB_WORKSPACE/$WHEEL" "$GITHUB_WORKSPACE/$SDIST"
          env -u DJANGO_SETTINGS_MODULE PYTHONPATH="$GITHUB_WORKSPACE/tests/packaging" /tmp/general-manager-release-venv/bin/python -m general_manager.chat.evals --settings chat_eval_smoke_settings --provider builtins.object --fixture toy --dataset basic_queries --tier 999

      - name: Verify existing PyPI artifact hashes before release
        if: ${{ steps.prepare.outputs.released == 'true' }}
        env:
          EXPECTED_VERSION: ${{ steps.prepare.outputs.version }}
        run: >-
          python scripts/verify_pypi_artifacts.py
          GeneralManager "$EXPECTED_VERSION" dist

      - name: Upload validated distributions
        if: ${{ steps.prepare.outputs.released == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: validated-distributions-${{ github.sha }}
          path: dist/*
          retention-days: 90
          if-no-files-found: error

  release:
    name: Release and publish validated artifacts
    needs: artifact
    if: ${{ needs.artifact.outputs.released == 'true' }}
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.repository }}-release
      cancel-in-progress: false
      queue: max
    permissions:
      contents: write

    steps:
      - name: Checkout exact release commit over SSH
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ssh-key: ${{ secrets.SSH_DEPLOY_KEY }}
          ssh-strict: true
          persist-credentials: true
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Configure release branch and SSH origin
        run: |
          git remote set-url origin "git@github.com:${GITHUB_REPOSITORY}.git"
          git fetch origin main
          git switch -C main "$GITHUB_SHA"
          git branch --set-upstream-to=origin/main main
          git config --global user.name "github-actions"
          git config --global user.email "actions@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install release tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install python-semantic-release==10.6.1 twine==6.0.1

      - name: Download validated distributions
        uses: actions/download-artifact@v4
        with:
          name: validated-distributions-${{ github.sha }}
          path: validated-dist

      - id: release
        name: Create the release without rebuilding
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release version --skip-build

      - id: verify_release
        name: Verify or recover the release provenance
        env:
          EXPECTED_VERSION: ${{ needs.artifact.outputs.version }}
          EXPECTED_TAG: ${{ needs.artifact.outputs.tag }}
          ACTUAL_VERSION: ${{ steps.release.outputs.version }}
          ACTUAL_TAG: ${{ steps.release.outputs.tag }}
          PSR_RELEASED: ${{ steps.release.outputs.released }}
          PSR_COMMIT_SHA: ${{ steps.release.outputs.commit_sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$EXPECTED_VERSION"
          test -n "$EXPECTED_TAG"

          validate_release_commit() {
            RELEASE_COMMIT="$1"
            git merge-base --is-ancestor "$RELEASE_COMMIT" origin/main || return 1
            TAG_VERSION="$(
              git show "$RELEASE_COMMIT:pyproject.toml" |
                python -c 'import sys, tomllib; print(tomllib.loads(sys.stdin.read())["project"]["version"])'
            )" || return 1
            [ "$TAG_VERSION" = "$EXPECTED_VERSION" ] || return 1
            git show "$RELEASE_COMMIT:CHANGELOG.md" |
              awk -v heading="## $EXPECTED_TAG " '
                index($0, heading) == 1 { found = 1 }
                END { exit !found }
              ' || return 1

            if [ "$RELEASE_COMMIT" = "$GITHUB_SHA" ]; then
              return 0
            fi

            RELEASE_PARENTS="$(git show -s --format=%P "$RELEASE_COMMIT")" || return 1
            [ "$RELEASE_PARENTS" = "$GITHUB_SHA" ] || return 1
            RELEASE_FILES="$(git diff-tree --no-commit-id --name-only -r "$RELEASE_COMMIT" | sort)" || return 1
            [ -n "$RELEASE_FILES" ] || return 1
            while IFS= read -r RELEASE_FILE; do
              case "$RELEASE_FILE" in
                CHANGELOG.md|pyproject.toml) ;;
                *) return 1 ;;
              esac
            done <<< "$RELEASE_FILES"
          }

          if [ -n "$ACTUAL_VERSION" ]; then
            test "$EXPECTED_VERSION" = "$ACTUAL_VERSION"
          fi
          if [ -n "$ACTUAL_TAG" ]; then
            test "$EXPECTED_TAG" = "$ACTUAL_TAG"
          fi

          git fetch origin "+refs/heads/main:refs/remotes/origin/main"
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
          REMOTE_TAG_STATUS=0
          git ls-remote --exit-code --refs origin "refs/tags/$EXPECTED_TAG" \
            >/dev/null || REMOTE_TAG_STATUS="$?"
          case "$REMOTE_TAG_STATUS" in
            0)
              git fetch --force origin "refs/tags/$EXPECTED_TAG:refs/tags/$EXPECTED_TAG"
              ;;
            2)
              if validate_release_commit "$GITHUB_SHA"; then
                CANDIDATE_COMMIT="$GITHUB_SHA"
              else
                CANDIDATE_COMMIT="$(
                  git rev-list --first-parent --reverse "$GITHUB_SHA..origin/main" |
                    sed -n '1p'
                )"
                test -n "$CANDIDATE_COMMIT"
                validate_release_commit "$CANDIDATE_COMMIT"
              fi

              git tag --annotate --force --message "$EXPECTED_TAG" "$EXPECTED_TAG" "$CANDIDATE_COMMIT"
              TAG_PUSH_STATUS=0
              git push origin "refs/tags/$EXPECTED_TAG" || TAG_PUSH_STATUS="$?"
              if [ "$TAG_PUSH_STATUS" -ne 0 ]; then
                echo "Tag push returned status $TAG_PUSH_STATUS; checking for a race winner"
              fi
              git fetch --force origin "refs/tags/$EXPECTED_TAG:refs/tags/$EXPECTED_TAG"
              ;;
            *)
              exit "$REMOTE_TAG_STATUS"
              ;;
          esac

          TAG_COMMIT="$(git rev-parse "$EXPECTED_TAG^{commit}")"
          validate_release_commit "$TAG_COMMIT"

          if [ "$PSR_RELEASED" = "true" ]; then
            test -n "$PSR_COMMIT_SHA"
            test "$PSR_COMMIT_SHA" = "$TAG_COMMIT"
          fi

          if ! gh release view "$EXPECTED_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$EXPECTED_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "$EXPECTED_TAG" \
              --generate-notes
          fi
          gh release view "$EXPECTED_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null

      - id: verify_pypi_before
        name: Verify existing PyPI artifact hashes
        env:
          EXPECTED_VERSION: ${{ needs.artifact.outputs.version }}
        run: >-
          python scripts/verify_pypi_artifacts.py
          GeneralManager "$EXPECTED_VERSION" validated-dist

      - id: publish_pypi
        name: Publish missing validated distributions to PyPI
        run: twine upload --non-interactive --skip-existing validated-dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

      - id: verify_pypi_after
        name: Verify every published PyPI artifact hash
        env:
          EXPECTED_VERSION: ${{ needs.artifact.outputs.version }}
        run: >-
          python scripts/verify_pypi_artifacts.py
          GeneralManager "$EXPECTED_VERSION" validated-dist --require-all
