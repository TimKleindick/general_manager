name: Publish and Release

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    uses: ./.github/workflows/quality.yml

  artifact:
    name: Build and validate release artifacts
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      released: ${{ steps.prepare.outputs.released || 'false' }}
      version: ${{ steps.prepare.outputs.version }}
      tag: ${{ steps.prepare.outputs.tag }}

    steps:
      - name: Checkout exact release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install release tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install python-semantic-release==10.6.1 build twine==6.0.1

      - id: prepare
        name: Prepare release artifacts without mutating Git
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          semantic-release version
          --no-commit
          --no-tag
          --no-push
          --no-vcs-release

      - name: Verify the stamped project version
        if: ${{ steps.prepare.outputs.released == 'true' }}
        env:
          EXPECTED_VERSION: ${{ steps.prepare.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          with Path("pyproject.toml").open("rb") as project_file:
              configuration = tomllib.load(project_file)
          actual_version = configuration["project"]["version"]
          expected_version = os.environ["EXPECTED_VERSION"]
          if actual_version != expected_version:
              raise SystemExit(
                  f"Stamped version {actual_version!r} does not match "
                  f"semantic-release version {expected_version!r}"
              )
          PY

      - name: Check distribution metadata
        if: ${{ steps.prepare.outputs.released == 'true' }}
        run: twine check dist/*

      - name: Validate distribution archives
        if: ${{ steps.prepare.outputs.released == 'true' }}
        run: python scripts/validate_distribution.py archives dist

      - name: Validate the installed wheel
        if: ${{ steps.prepare.outputs.released == 'true' }}
        run: |
          python -m venv /tmp/general-manager-release-venv
          /tmp/general-manager-release-venv/bin/python -m pip install --upgrade pip
          /tmp/general-manager-release-venv/bin/python -m pip install "$(find dist -maxdepth 1 -type f -name '*.whl' -print -quit)"
          cd /tmp
          /tmp/general-manager-release-venv/bin/python "$GITHUB_WORKSPACE/scripts/validate_distribution.py" installed

      - name: Upload validated distributions
        if: ${{ steps.prepare.outputs.released == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: validated-distributions-${{ github.sha }}
          path: dist/*
          retention-days: 90
          if-no-files-found: error

  release:
    name: Release and publish validated artifacts
    needs: artifact
    if: ${{ needs.artifact.outputs.released == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout exact release commit over SSH
        uses: actions/checkout@v4
        with:
          repository: TimKleindick/general_manager
          ssh-key: ${{ secrets.SSH_DEPLOY_KEY }}
          ssh-strict: true
          persist-credentials: true
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Configure release branch and SSH origin
        run: |
          git remote set-url origin git@github.com:TimKleindick/general_manager.git
          git fetch origin main
          git switch -C main "$GITHUB_SHA"
          git branch --set-upstream-to=origin/main main
          git config --global user.name "github-actions"
          git config --global user.email "actions@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install release tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install python-semantic-release==10.6.1 twine==6.0.1

      - name: Download validated distributions
        uses: actions/download-artifact@v4
        with:
          name: validated-distributions-${{ github.sha }}
          path: validated-dist

      - id: release
        name: Create the release without rebuilding
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release version --skip-build

      - id: verify_release
        name: Verify or recover the release provenance
        env:
          EXPECTED_VERSION: ${{ needs.artifact.outputs.version }}
          EXPECTED_TAG: ${{ needs.artifact.outputs.tag }}
          ACTUAL_VERSION: ${{ steps.release.outputs.version }}
          ACTUAL_TAG: ${{ steps.release.outputs.tag }}
          PSR_RELEASED: ${{ steps.release.outputs.released }}
          PSR_COMMIT_SHA: ${{ steps.release.outputs.commit_sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$EXPECTED_VERSION"
          test -n "$EXPECTED_TAG"

          if [ -n "$ACTUAL_VERSION" ]; then
            test "$EXPECTED_VERSION" = "$ACTUAL_VERSION"
          fi
          if [ -n "$ACTUAL_TAG" ]; then
            test "$EXPECTED_TAG" = "$ACTUAL_TAG"
          fi

          git fetch --force origin "refs/tags/$EXPECTED_TAG:refs/tags/$EXPECTED_TAG"
          TAG_COMMIT="$(git rev-parse "$EXPECTED_TAG^{commit}")"
          RELEASE_PARENTS="$(git show -s --format=%P "$TAG_COMMIT")"
          test "$RELEASE_PARENTS" = "$GITHUB_SHA"

          EXPECTED_FILES="$(printf '%s\n' CHANGELOG.md pyproject.toml | sort)"
          RELEASE_FILES="$(git diff-tree --no-commit-id --name-only -r "$TAG_COMMIT" | sort)"
          test "$RELEASE_FILES" = "$EXPECTED_FILES"

          TAG_VERSION="$(
            git show "$TAG_COMMIT:pyproject.toml" |
              python -c 'import sys, tomllib; print(tomllib.loads(sys.stdin.read())["project"]["version"])'
          )"
          test "$TAG_VERSION" = "$EXPECTED_VERSION"

          if [ "$PSR_RELEASED" = "true" ]; then
            test -n "$PSR_COMMIT_SHA"
          fi
          if [ -n "$PSR_COMMIT_SHA" ]; then
            test "$PSR_COMMIT_SHA" = "$TAG_COMMIT"
          fi

          if ! gh release view "$EXPECTED_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$EXPECTED_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --title "$EXPECTED_TAG" \
              --generate-notes
          fi
          gh release view "$EXPECTED_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null

      - id: verify_pypi_before
        name: Verify existing PyPI artifact hashes
        env:
          EXPECTED_VERSION: ${{ needs.artifact.outputs.version }}
        run: >-
          python scripts/verify_pypi_artifacts.py
          GeneralManager "$EXPECTED_VERSION" validated-dist

      - id: publish_pypi
        name: Publish missing validated distributions to PyPI
        run: twine upload --non-interactive --skip-existing validated-dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

      - id: verify_pypi_after
        name: Verify every published PyPI artifact hash
        env:
          EXPECTED_VERSION: ${{ needs.artifact.outputs.version }}
        run: >-
          python scripts/verify_pypi_artifacts.py
          GeneralManager "$EXPECTED_VERSION" validated-dist --require-all
