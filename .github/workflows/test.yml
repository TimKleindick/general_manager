name: Test
permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    services:
      meilisearch:
        image: getmeili/meilisearch:v1.30.0
        ports:
          - 7700:7700
        env:
          MEILI_NO_ANALYTICS: "true"
        options: >-
          --health-cmd="wget -qO- http://127.0.0.1:7700/health"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package in editable mode + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[file-upload-image]"
          pip install pytest pytest-django pytest-cov meilisearch==0.40.0

      - name: Run pytest with coverage
        env:
          MEILISEARCH_URL: http://127.0.0.1:7700
        run: python3 -m pytest --cov=general_manager --cov-report=xml:coverage.xml

      - name: Upload to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: coverage.xml
          flags: unittests
          version: v11.2.7
          fail_ci_if_error: false

  distribution:
    name: Package smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build distribution
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build

      - name: Install built wheel
        run: python -m pip install --force-reinstall dist/*.whl

      - name: Smoke-test built distribution
        run: |
          env -u DJANGO_SETTINGS_MODULE python -m general_manager.chat.evals --help
          env -u DJANGO_SETTINGS_MODULE PYTHONPATH=tests/packaging python -m general_manager.chat.evals --settings chat_eval_smoke_settings --provider builtins.object --fixture toy --dataset basic_queries --tier 999
          python tests/packaging/smoke_chat_eval_distribution.py dist/*
