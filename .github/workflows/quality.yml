name: Quality

on:
  pull_request:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    services:
      meilisearch:
        image: getmeili/meilisearch:v1.30.0
        ports:
          - 7700:7700
        env:
          MEILI_NO_ANALYTICS: "true"
        options: >-
          --health-cmd="wget -qO- http://127.0.0.1:7700/health"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package in editable mode + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[file-upload-image]"
          pip install pytest pytest-django pytest-cov meilisearch==0.40.0

      - name: Run pytest with coverage
        env:
          MEILISEARCH_URL: http://127.0.0.1:7700
        run: python3 -m pytest --cov=general_manager --cov-report=xml:coverage.xml

      - name: Upload to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: coverage.xml
          flags: unittests
          version: v11.2.7
          fail_ci_if_error: false

  lint-and-mypy:
    name: lint-and-mypy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml', 'requirements/*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/development.txt
          pip install pre-commit ruff==0.14.1

      - name: Ruff lint
        run: ruff check --config pyproject.toml src tests scripts

      - name: Ruff format check
        run: ruff format --config pyproject.toml --check .

      - name: Mypy
        run: mypy --strict

      - name: Run pre-commit (without Ruff)
        env:
          SKIP: ruff,ruff-format
        run: pre-commit run --all-files

  docs:
    name: Build MkDocs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml', 'mkdocs.yml', 'requirements/*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install mkdocs-material mkdocstrings[python] pymdown-extensions
          pip install -r requirements/development.txt

      - name: Build site
        run: mkdocs build --strict
