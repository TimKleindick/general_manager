name: Quality

on:
  pull_request:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    services:
      meilisearch:
        image: getmeili/meilisearch:v1.30.0
        ports:
          - 7700:7700
        env:
          MEILI_NO_ANALYTICS: "true"
        options: >-
          --health-cmd="wget -qO- http://127.0.0.1:7700/health"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package in editable mode + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[file-upload-image]"
          pip install pytest pytest-django pytest-cov meilisearch==0.40.0

      - name: Run pytest with coverage
        env:
          MEILISEARCH_URL: http://127.0.0.1:7700
        run: python3 -m pytest --cov=general_manager --cov-report=xml:coverage.xml

      - name: Upload to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: coverage.xml
          flags: unittests
          version: v11.2.7
          fail_ci_if_error: false

      - id: build_distribution
        name: Build distribution
        if: ${{ matrix.python-version == '3.12' && (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch') }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine==6.0.1
          python -m build

      - id: validate_distribution
        name: Validate distribution archives
        if: ${{ matrix.python-version == '3.12' && (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch') }}
        run: |
          EXPECTED_VERSION="$(
            python - <<'PY'
          import tomllib
          from pathlib import Path

          with Path("pyproject.toml").open("rb") as project_file:
              configuration = tomllib.load(project_file)
          print(configuration["project"]["version"])
          PY
          )"
          twine check dist/*
          python scripts/validate_distribution.py archives dist "$EXPECTED_VERSION"

      - id: smoke_distribution
        name: Smoke-test installed distribution
        if: ${{ matrix.python-version == '3.12' && (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch') }}
        run: |
          set -euo pipefail
          WHEEL="$(find dist -maxdepth 1 -type f -name '*.whl' -print -quit)"
          SDIST="$(find dist -maxdepth 1 -type f -name '*.tar.gz' -print -quit)"
          test -n "$WHEEL"
          test -n "$SDIST"
          python -m venv /tmp/general-manager-quality-venv
          /tmp/general-manager-quality-venv/bin/python -m pip install --upgrade pip
          /tmp/general-manager-quality-venv/bin/python -m pip install "$WHEEL"
          cd /tmp
          /tmp/general-manager-quality-venv/bin/python "$GITHUB_WORKSPACE/scripts/validate_distribution.py" installed
          /tmp/general-manager-quality-venv/bin/python "$GITHUB_WORKSPACE/tests/packaging/smoke_readme_onboarding.py" "$GITHUB_WORKSPACE"
          /tmp/general-manager-quality-venv/bin/python "$GITHUB_WORKSPACE/tests/packaging/smoke_chat_eval_distribution.py" "$GITHUB_WORKSPACE/$WHEEL" "$GITHUB_WORKSPACE/$SDIST"
          env -u DJANGO_SETTINGS_MODULE PYTHONPATH="$GITHUB_WORKSPACE/tests/packaging" /tmp/general-manager-quality-venv/bin/python -m general_manager.chat.evals --settings chat_eval_smoke_settings --provider builtins.object --fixture toy --dataset basic_queries --tier 999

  database-backends:
    name: 🗄️ ${{ matrix.database.name }} / Python ${{ matrix.python-version }}
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
        database:
          - name: PostgreSQL 18
            selector: postgresql
            image: postgres:18
            port: 5432
            user: postgres
            driver: psycopg[binary]>=3.3,<4
            health-command: pg_isready -U postgres -d general_manager
          - name: MariaDB 11.8 LTS
            selector: mariadb
            image: mariadb:11.8
            port: 3306
            user: root
            driver: mysqlclient>=2.2,<3
            health-command: healthcheck.sh --connect --innodb_initialized
    services:
      database:
        image: ${{ matrix.database.image }}
        ports:
          - "${{ matrix.database.port }}:${{ matrix.database.port }}"
        env:
          POSTGRES_DB: general_manager
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: general_manager
          MARIADB_DATABASE: general_manager
          MARIADB_ROOT_PASSWORD: general_manager
        options: >-
          --health-cmd="${{ matrix.database.health-command }}"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
      meilisearch:
        image: getmeili/meilisearch:v1.30.0
        ports:
          - 7700:7700
        env:
          MEILI_NO_ANALYTICS: "true"
        options: >-
          --health-cmd="wget -qO- http://127.0.0.1:7700/health"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package, test dependencies, and database driver
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[file-upload-image]"
          pip install pytest pytest-django meilisearch==0.40.0
          pip install "${{ matrix.database.driver }}"

      - name: Run backend test suite
        env:
          GENERAL_MANAGER_TEST_DATABASE: ${{ matrix.database.selector }}
          GENERAL_MANAGER_TEST_DATABASE_NAME: general_manager
          GENERAL_MANAGER_TEST_DATABASE_USER: ${{ matrix.database.user }}
          GENERAL_MANAGER_TEST_DATABASE_PASSWORD: general_manager
          GENERAL_MANAGER_TEST_DATABASE_HOST: 127.0.0.1
          GENERAL_MANAGER_TEST_DATABASE_PORT: ${{ matrix.database.port }}
          MEILISEARCH_URL: http://127.0.0.1:7700
        run: python -m pytest -m "not perf"

  lint-and-mypy:
    name: lint-and-mypy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml', 'requirements/*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/development.txt
          pip install pre-commit ruff==0.14.1

      - name: Ruff lint
        run: ruff check --config pyproject.toml src tests scripts

      - name: Ruff format check
        run: ruff format --config pyproject.toml --check .

      - name: Mypy
        run: mypy --strict

      - name: Run pre-commit (without Ruff)
        env:
          SKIP: ruff,ruff-format
        run: pre-commit run --all-files

  docs:
    name: Build MkDocs
    uses: ./.github/workflows/docs-build.yml
